name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx next build --webpack
      - name: Prepare deployment
        run: |
          mkdir -p out/physics-learn
          for f in out/*; do
            basename=$(basename "$f")
            if [ "$basename" != "physics-learn" ]; then
              mv "$f" out/physics-learn/
            fi
          done
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
